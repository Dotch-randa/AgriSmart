name: app_3ouchba
description: Application pour agriculteurs algériens
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^11.0.0
  google_maps_flutter: ^2.5.0   # Pour la carte, optionnel
  flutter_animate: ^4.0.0       # Pour les animations simples
  image_picker: ^1.0.7
  supabase_flutter: ^2.5.0
  provider: ^6.0.5
  http: ^1.2.2
  uuid: ^4.4.2
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  url_launcher: ^6.2.0
  get: ^4.7.3
  connectivity_plus: ^5.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - images/ # Assurez-vous que ce chemin correspond à votre image dans le projet
    